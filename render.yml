services:
  - type: web
    name: taxi-support-backend
    env: java
    buildCommand: ./gradlew build
    startCommand: java -jar build/libs/*.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taxi-support-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: taxi-support-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: taxi-support-db
          property: password
      - key: MAIL_HOST
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: STORAGE_VOICE_PATH
        value: /var/data/voice
      - key: STORAGE_ATTACHMENTS_PATH
        value: /var/data/attachments

databases:
  - name: taxi-support-db
    plan: starter
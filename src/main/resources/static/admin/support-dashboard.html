<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Dashboard - Taxi App</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        :root {
            --primary-color: #6C63FF;
            --secondary-color: #00D4FF;
            --dark-bg: #0a0e27;
            --card-bg: #141833;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
        }

        body {
            background: var(--dark-bg);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .sidebar {
            background: var(--card-bg);
            min-height: 100vh;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar .nav-link {
            color: var(--text-secondary);
            padding: 12px 20px;
            border-radius: 10px;
            margin: 4px 0;
            transition: all 0.3s ease;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: rgba(108, 99, 255, 0.15);
            color: var(--primary-color);
        }

        .sidebar .nav-link i {
            width: 24px;
            margin-right: 10px;
        }

        .main-content {
            padding: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card .icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .ticket-list {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .ticket-item {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
            border-left: 4px solid transparent;
        }

        .ticket-item:hover {
            background: rgba(255,255,255,0.06);
        }

        .ticket-item.priority-urgent {
            border-left-color: #FF4757;
        }

        .ticket-item.priority-high {
            border-left-color: #FF6348;
        }

        .ticket-item.priority-medium {
            border-left-color: #FFA502;
        }

        .ticket-item.priority-low {
            border-left-color: #2ED573;
        }

        .badge-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .badge-status.open { background: #FFA502; color: #000; }
        .badge-status.in_progress { background: #00D4FF; color: #000; }
        .badge-status.waiting { background: #FF6B6B; color: #fff; }
        .badge-status.resolved { background: #2ED573; color: #000; }
        .badge-status.closed { background: #a0aec0; color: #000; }

        .chat-container {
            height: 400px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 15px;
        }

        .message {
            margin-bottom: 15px;
            max-width: 80%;
        }

        .message.user {
            margin-left: auto;
        }

        .message .bubble {
            padding: 10px 15px;
            border-radius: 15px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .message.user .bubble {
            background: var(--primary-color);
        }

        .message .time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .voice-message {
            background: rgba(108, 99, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .voice-message .play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-color);
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .voice-message .play-btn:hover {
            transform: scale(1.1);
        }

        .typing-indicator {
            display: none;
            padding: 10px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            width: fit-content;
        }

        .typing-indicator .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            margin: 0 3px;
            animation: typing 1.4s infinite both;
        }

        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-10px); opacity: 1; }
        }

        .attachment-preview {
            max-width: 200px;
            border-radius: 10px;
            margin: 5px 0;
        }

        .quick-response-btn {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 15px;
            background: rgba(108, 99, 255, 0.1);
            border: 1px solid rgba(108, 99, 255, 0.2);
            color: var(--primary-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quick-response-btn:hover {
            background: var(--primary-color);
            color: white;
        }

        @media (max-width: 768px) {
            .sidebar {
                min-height: auto;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 sidebar p-3">
            <div class="text-center mb-4">
                <h4 class="text-primary">🛠️ Support</h4>
                <small class="text-secondary">Version 1.0.0</small>
            </div>

            <nav class="nav flex-column">
                <a href="#" class="nav-link active" data-page="dashboard">
                    <i class="fas fa-chart-pie"></i> Dashboard
                </a>
                <a href="#" class="nav-link" data-page="tickets">
                    <i class="fas fa-ticket-alt"></i> Tickets
                    <span class="badge bg-danger float-end" id="openTicketsCount">0</span>
                </a>
                <a href="#" class="nav-link" data-page="messages">
                    <i class="fas fa-comments"></i> Messages
                    <span class="badge bg-primary float-end" id="unreadCount">0</span>
                </a>
                <a href="#" class="nav-link" data-page="agents">
                    <i class="fas fa-users"></i> Agents
                </a>
                <a href="#" class="nav-link" data-page="categories">
                    <i class="fas fa-tags"></i> Catégories
                </a>
                <a href="#" class="nav-link" data-page="quick-responses">
                    <i class="fas fa-bolt"></i> Réponses Rapides
                </a>
                <a href="#" class="nav-link" data-page="settings">
                    <i class="fas fa-cog"></i> Paramètres
                </a>
            </nav>

            <hr class="border-secondary">

            <div class="mt-auto">
                <div class="d-flex align-items-center">
                    <img src="https://ui-avatars.com/api/?name=Admin+Support&background=6C63FF&color=fff"
                         class="rounded-circle me-2" width="40" height="40">
                    <div>
                        <small class="d-block">Admin Support</small>
                        <small class="text-secondary">En ligne</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-md-9 col-lg-10 main-content" id="mainContent">
            <!-- Le contenu sera chargé dynamiquement -->
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="support.js"></script>
</body>
</html>

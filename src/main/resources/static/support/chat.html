<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Client - Taxi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0a0e27; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .chat-container { max-width: 800px; margin: 50px auto; background: #141833; border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .chat-header { text-align: center; margin-bottom: 30px; }
        .chat-header h2 { color: #6C63FF; }
        .chat-messages { height: 400px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .message { margin-bottom: 15px; max-width: 80%; }
        .message.user { margin-left: auto; }
        .message .bubble { padding: 10px 15px; border-radius: 15px; background: #1a1a3e; border: 1px solid rgba(255,255,255,0.05); }
        .message.user .bubble { background: #6C63FF; }
        .message .time { font-size: 11px; color: #a0aec0; margin-top: 4px; }
        .input-group { display: flex; gap: 10px; }
        .input-group input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; }
        .input-group button { padding: 12px 30px; border-radius: 10px; background: #6C63FF; border: none; color: #fff; font-weight: 600; }
        .input-group button:hover { background: #5a52d5; }
        .status { text-align: center; margin-top: 10px; font-size: 14px; }
        .status.online { color: #2ED573; }
        .status.offline { color: #FF4757; }
        .user-info { background: rgba(108,99,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-info select { padding: 8px; border-radius: 8px; background: #141833; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h2><i class="fas fa-headset"></i> Support Client</h2>
        <p class="text-secondary">Une question ? Un problème ? Nous sommes là pour vous aider !</p>
    </div>

    <div class="user-info">
        <div>
            <strong><i class="fas fa-user"></i> Vous :</strong>
            <span id="userNameDisplay">Client</span>
        </div>
        <div>
            <select id="userTypeSelect">
                <option value="CLIENT">👤 Client</option>
                <option value="DRIVER">🚖 Chauffeur</option>
            </select>
        </div>
    </div>

    <div id="chatMessages" class="chat-messages">
        <div class="text-center text-secondary py-5">
            <i class="fas fa-comment-dots fa-3x mb-3 d-block opacity-25"></i>
            <p>Bienvenue ! Envoyez votre message, un agent vous répondra.</p>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="messageInput" placeholder="Écrivez votre message..." onkeypress="if(event.key==='Enter') sendMessage();">
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Envoyer</button>
    </div>

    <div class="status" id="connectionStatus">🟡 Connexion en cours...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/stomp.min.js"></script>
<script>
    let stompClient = null;
    let isConnected = false;
    let userId = Math.floor(Math.random() * 10000);
    let defaultTicketId = 1;

    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const statusEl = document.getElementById('connectionStatus');
    const userTypeSelect = document.getElementById('userTypeSelect');
    const userNameDisplay = document.getElementById('userNameDisplay');

    function connectWebSocket() {
        try {
            const socket = new SockJS('https://abdil-taxi-backend.onrender.com/ws-support');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;

            stompClient.connect({}, function(frame) {
                console.log('✅ Connecté au WebSocket');
                isConnected = true;
                statusEl.className = 'status online';
                statusEl.innerHTML = '🟢 Connecté - Posez votre question ci-dessous';

                stompClient.subscribe('/topic/ticket/' + defaultTicketId, function(message) {
                    const data = JSON.parse(message.body);
                    displayMessage(data);
                });

            }, function(error) {
                console.error('❌ Erreur WebSocket:', error);
                isConnected = false;
                statusEl.className = 'status offline';
                statusEl.innerHTML = '🔴 Déconnecté - Reconnexion en cours...';
                setTimeout(connectWebSocket, 5000);
            });

        } catch (error) {
            console.error('❌ Erreur SockJS:', error);
            setTimeout(connectWebSocket, 5000);
        }
    }

    function sendMessage() {
        const message = messageInput.value.trim();
        if (!message || !stompClient || !isConnected) {
            if (!isConnected) alert('Connexion en cours, veuillez patienter...');
            return;
        }

        const userType = userTypeSelect.value;
        const userName = userType === 'CLIENT' ? 'Client' : 'Chauffeur';

        const chatMessage = {
            ticketId: defaultTicketId,
            senderId: userId,
            senderType: 'USER',
            senderName: userName,
            content: message,
            messageType: 'TEXT'
        };

        stompClient.send('/app/chat.sendMessage', {}, JSON.stringify(chatMessage));
        messageInput.value = '';
    }

    function displayMessage(message) {
        const isUser = message.senderType === 'USER';
        const div = document.createElement('div');
        // Côté Client (chat.html), ses propres messages (USER) doivent aller à droite (.user)
        div.className = `message ${isUser ? 'user' : ''}`;
        div.innerHTML = `
            <div class="bubble">
                ${!isUser ? `<small class="text-warning d-block mb-1">${message.senderName || 'Agent Support'}</small>` : ''}
                <p class="mb-0">${message.content || message.message || 'Message vide'}</p>
                <div class="time">${new Date().toLocaleTimeString()}</div>
            </div>
        `;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        const welcomeMsg = chatMessages.querySelector('.text-secondary');
        if (welcomeMsg) welcomeMsg.remove();
    }

    userTypeSelect.addEventListener('change', function() {
        const labels = { 'CLIENT': 'Client', 'DRIVER': 'Chauffeur' };
        userNameDisplay.textContent = labels[this.value] || 'Client';
    });

    connectWebSocket();
</script>
</body>
</html>

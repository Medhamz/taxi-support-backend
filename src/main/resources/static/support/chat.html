<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Client - Taxi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0a0e27; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .chat-container { max-width: 800px; margin: 50px auto; background: #141833; border-radius: 20px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .chat-header { text-align: center; margin-bottom: 30px; }
        .chat-header h2 { color: #6C63FF; }
        .chat-messages { height: 400px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .message { margin-bottom: 15px; max-width: 80%; }
        .message.user { margin-left: auto; }
        .message .bubble { padding: 10px 15px; border-radius: 15px; background: #1a1a3e; border: 1px solid rgba(255,255,255,0.05); }
        .message.user .bubble { background: #6C63FF; }
        .message .time { font-size: 11px; color: #a0aec0; margin-top: 4px; }
        .input-group { display: flex; gap: 10px; }
        .input-group input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; }
        .input-group input::placeholder { color: #6c757d; }
        .input-group button { padding: 12px 30px; border-radius: 10px; background: #6C63FF; border: none; color: #fff; font-weight: 600; }
        .input-group button:hover { background: #5a52d5; }
        .status { text-align: center; margin-top: 10px; font-size: 14px; }
        .status.online { color: #2ED573; }
        .status.offline { color: #FF4757; }
        .user-info { background: rgba(108,99,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .user-info select { padding: 8px; border-radius: 8px; background: #141833; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .user-info input { padding: 8px; border-radius: 8px; background: #141833; color: #fff; border: 1px solid rgba(255,255,255,0.1); flex: 1; min-width: 150px; }
        .user-info input::placeholder { color: #6c757d; }
        .ticket-id { color: #6C63FF; font-weight: bold; }
        .loading { color: #FFA502; }
        .error { color: #FF4757; }
        .small-text { font-size: 12px; color: #6c757d; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h2><i class="fas fa-headset"></i> Support Client</h2>
        <p class="text-secondary">Une question ? Un problème ? Nous sommes là pour vous aider !</p>
        <div class="ticket-id" id="ticketIdDisplay">🔄 Création du ticket...</div>
    </div>

    <div class="user-info">
        <div>
            <strong><i class="fas fa-user"></i> Vous :</strong>
            <span id="userNameDisplay">Client</span>
        </div>
        <div>
            <select id="userTypeSelect">
                <option value="CLIENT">👤 Client</option>
                <option value="DRIVER">🚖 Chauffeur</option>
            </select>
        </div>
        <div>
            <input type="email" id="userEmailInput" placeholder="Email (optionnel)" class="form-control-sm">
        </div>
        <div>
            <input type="text" id="userPhoneInput" placeholder="Téléphone (optionnel)" class="form-control-sm">
        </div>
    </div>

    <div id="chatMessages" class="chat-messages">
        <div class="text-center text-secondary py-5">
            <i class="fas fa-comment-dots fa-3x mb-3 d-block opacity-25"></i>
            <p>Bienvenue ! Envoyez votre message, un agent vous répondra.</p>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="messageInput" placeholder="Écrivez votre message..." onkeypress="if(event.key==='Enter') sendMessage();">
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Envoyer</button>
    </div>

    <div class="status" id="connectionStatus">🟢 Connecté</div>
    <div class="small-text text-center mt-2">Ticket #<span id="ticketNumberDisplay">-</span></div>
</div>

<script>
    const API_BASE_URL = 'https://taxi-support-backend.onrender.com/api/support';

    // ✅ Générer un ID utilisateur valide (entre 1000 et 999999)
    let userId = Math.floor(Math.random() * 999000) + 1000;
    let defaultTicketId = null;
    let pollingInterval = null;
    let lastMessageId = 0;
    let isCreatingTicket = false;

    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const statusEl = document.getElementById('connectionStatus');
    const userTypeSelect = document.getElementById('userTypeSelect');
    const userNameDisplay = document.getElementById('userNameDisplay');
    const ticketIdDisplay = document.getElementById('ticketIdDisplay');
    const ticketNumberDisplay = document.getElementById('ticketNumberDisplay');
    const userEmailInput = document.getElementById('userEmailInput');
    const userPhoneInput = document.getElementById('userPhoneInput');

    console.log('👤 ID Utilisateur:', userId);

    // ✅ Fonction pour obtenir le texte du message (évite les null)
    function getMessageText(msg) {
        // Priorité: message > content > texte par défaut
        if (msg.message && msg.message !== 'null' && msg.message !== 'undefined') {
            return msg.message;
        }
        if (msg.content && msg.content !== 'null' && msg.content !== 'undefined') {
            return msg.content;
        }
        return 'Message';
    }

    // ✅ Créer un ticket avec l'API existante
    async function createTicket() {
        if (isCreatingTicket) return;
        isCreatingTicket = true;

        try {
            const userType = userTypeSelect.value;
            const userName = userType === 'CLIENT' ? 'Client' : 'Chauffeur';
            const userEmail = userEmailInput.value.trim() || null;
            const userPhone = userPhoneInput.value.trim() || null;

            console.log('🆕 Création d\'un nouveau ticket...');
            ticketIdDisplay.textContent = '⏳ Création en cours...';
            ticketIdDisplay.className = 'ticket-id loading';

            const ticketRequest = {
                userId: userId,
                userType: userType,
                userName: userName,
                userEmail: userEmail,
                userPhone: userPhone,
                category: 'GENERAL',
                subject: 'Support Client - Demande d\'assistance',
                description: 'Bonjour, j\'ai besoin d\'aide avec l\'application.',
                priority: 'MEDIUM'
            };

            console.log('📤 Envoi de la requête:', JSON.stringify(ticketRequest, null, 2));

            const response = await fetch(`${API_BASE_URL}/tickets`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(ticketRequest)
            });

            if (!response.ok) {
                const errorText = await response.text();
                console.error('❌ Erreur création ticket:', errorText);
                throw new Error('Erreur création ticket: ' + response.status + ' - ' + errorText);
            }

            const newTicket = await response.json();
            defaultTicketId = newTicket.id;
            console.log('✅ Ticket créé avec ID:', defaultTicketId);
            ticketIdDisplay.textContent = `✅ Ticket #${defaultTicketId}`;
            ticketIdDisplay.className = 'ticket-id';
            ticketNumberDisplay.textContent = defaultTicketId;

            // Démarrer le polling après création
            startPolling();

        } catch (error) {
            console.error('❌ Erreur createTicket:', error);
            ticketIdDisplay.textContent = '❌ Erreur - Rechargez la page';
            ticketIdDisplay.className = 'ticket-id error';
            statusEl.className = 'status offline';
            statusEl.innerHTML = '🔴 Erreur: ' + error.message;
        } finally {
            isCreatingTicket = false;
        }
    }

    // ✅ Récupérer les tickets existants pour cet utilisateur
    async function getExistingTickets() {
        try {
            const response = await fetch(`${API_BASE_URL}/tickets/user/${userId}`);

            if (!response.ok) {
                console.log('Aucun ticket existant pour cet utilisateur');
                return false;
            }

            const tickets = await response.json();

            if (tickets && tickets.length > 0) {
                // Utiliser le premier ticket existant
                defaultTicketId = tickets[0].id;
                console.log('✅ Ticket existant trouvé:', defaultTicketId);
                ticketIdDisplay.textContent = `Ticket #${defaultTicketId}`;
                ticketIdDisplay.className = 'ticket-id';
                ticketNumberDisplay.textContent = defaultTicketId;
                startPolling();
                return true;
            }
            return false;
        } catch (error) {
            console.error('Erreur récupération tickets:', error);
            return false;
        }
    }

    // Démarrer le polling
    function startPolling() {
        if (pollingInterval) {
            clearInterval(pollingInterval);
        }
        loadMessages();
        pollingInterval = setInterval(checkNewMessages, 2000);
        console.log('🔄 Polling démarré pour le ticket', defaultTicketId);
    }

    async function loadMessages() {
        if (!defaultTicketId) {
            console.log('⏳ En attente du ticket...');
            return;
        }

        try {
            console.log('📥 Chargement des messages pour le ticket', defaultTicketId);
            const response = await fetch(`${API_BASE_URL}/tickets/${defaultTicketId}`);

            if (!response.ok) {
                console.error('Erreur chargement messages:', response.status);
                return;
            }

            const ticket = await response.json();
            console.log('📥 Ticket reçu:', ticket);

            if (ticket.messages && ticket.messages.length > 0) {
                lastMessageId = ticket.messages[ticket.messages.length - 1].id || 0;
                displayMessages(ticket.messages);
            } else {
                // Afficher un message d'accueil
                chatMessages.innerHTML = `
                    <div class="text-center text-secondary py-5">
                        <i class="fas fa-comment-dots fa-3x mb-3 d-block opacity-25"></i>
                        <p>Soyez le premier à envoyer un message !</p>
                    </div>
                `;
            }
        } catch (error) {
            console.error('Erreur chargement messages:', error);
        }
    }

    function displayMessages(messages) {
        const container = chatMessages;
        container.innerHTML = '';

        if (!messages || messages.length === 0) {
            container.innerHTML = `
                <div class="text-center text-secondary py-5">
                    <i class="fas fa-comment-dots fa-3x mb-3 d-block opacity-25"></i>
                    <p>Soyez le premier à envoyer un message !</p>
                </div>
            `;
            return;
        }

        messages.forEach(msg => {
            const isUser = msg.senderType === 'USER';
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : ''}`;

            // ✅ CORRECTION : Utiliser getMessageText() pour éviter null
            const messageText = getMessageText(msg);

            div.innerHTML = `
                <div class="bubble">
                    ${!isUser ? `<small class="text-warning d-block mb-1">${msg.senderName || 'Agent Support'}</small>` : ''}
                    <p class="mb-0">${messageText}</p>
                    <div class="time">${new Date(msg.createdAt || Date.now()).toLocaleTimeString()}</div>
                </div>
            `;
            container.appendChild(div);
        });

        container.scrollTop = container.scrollHeight;
    }

    async function checkNewMessages() {
        if (!defaultTicketId) return;

        try {
            const response = await fetch(`${API_BASE_URL}/tickets/${defaultTicketId}`);
            if (!response.ok) return;

            const ticket = await response.json();

            if (!ticket.messages || ticket.messages.length === 0) return;

            const lastMsg = ticket.messages[ticket.messages.length - 1];
            if (lastMsg.id > lastMessageId) {
                const newMessages = ticket.messages.filter(msg => msg.id > lastMessageId);
                console.log('📨 Nouveaux messages reçus:', newMessages.length);

                // Supprimer le message "Pas de messages" s'il existe
                const emptyMsg = chatMessages.querySelector('.text-secondary');
                if (emptyMsg && chatMessages.children.length === 1) {
                    chatMessages.innerHTML = '';
                }

                newMessages.forEach(msg => {
                    const isUser = msg.senderType === 'USER';
                    const div = document.createElement('div');
                    div.className = `message ${isUser ? 'user' : ''}`;

                    // ✅ CORRECTION : Utiliser getMessageText() pour éviter null
                    const messageText = getMessageText(msg);

                    div.innerHTML = `
                        <div class="bubble">
                            ${!isUser ? `<small class="text-warning d-block mb-1">${msg.senderName || 'Agent Support'}</small>` : ''}
                            <p class="mb-0">${messageText}</p>
                            <div class="time">${new Date(msg.createdAt || Date.now()).toLocaleTimeString()}</div>
                        </div>
                    `;
                    chatMessages.appendChild(div);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
                lastMessageId = lastMsg.id;
            }
        } catch (error) {
            console.error('Erreur polling:', error);
        }
    }

    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) {
            alert('Veuillez écrire un message');
            return;
        }

        if (!defaultTicketId) {
            alert('Attendez la création du ticket...');
            return;
        }

        const userType = userTypeSelect.value;
        const userName = userType === 'CLIENT' ? 'Client' : 'Chauffeur';

        const messageRequest = {
            content: message,
            senderId: userId,
            senderType: 'USER',
            senderName: userName,
            messageType: 'TEXT'
        };

        try {
            console.log('📤 Envoi du message:', messageRequest);

            const response = await fetch(`${API_BASE_URL}/tickets/${defaultTicketId}/messages`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(messageRequest)
            });

            if (response.ok) {
                messageInput.value = '';
                // Recharger les messages
                await loadMessages();
                console.log('✅ Message envoyé avec succès');
            } else {
                const errorText = await response.text();
                console.error('❌ Erreur envoi message:', errorText);
                alert('Erreur lors de l\'envoi du message: ' + errorText);
            }
        } catch (error) {
            console.error('❌ Erreur envoi message:', error);
            alert('Erreur de connexion: ' + error.message);
        }
    }

    userTypeSelect.addEventListener('change', function() {
        const labels = { 'CLIENT': 'Client', 'DRIVER': 'Chauffeur' };
        userNameDisplay.textContent = labels[this.value] || 'Client';
    });

    // ✅ Initialisation
    async function init() {
        console.log('🚀 Initialisation du chat...');
        console.log('👤 ID Utilisateur:', userId);

        try {
            // Essayer de récupérer un ticket existant
            const hasExisting = await getExistingTickets();

            if (!hasExisting) {
                // Créer un nouveau ticket
                await createTicket();
            }
        } catch (error) {
            console.error('❌ Erreur initialisation:', error);
            ticketIdDisplay.textContent = '❌ Erreur - Rechargez';
            ticketIdDisplay.className = 'ticket-id error';
        }
    }

    // Nettoyer le polling
    window.addEventListener('beforeunload', function() {
        if (pollingInterval) {
            clearInterval(pollingInterval);
        }
    });

    // Démarrer
    init();
</script>
</body>
</html>

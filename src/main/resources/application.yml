spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod} # Par défaut, utilise la config de production (Render)
---
# ===================================================================
# CONFIGURATION PRODUCTION (RENDER) - PROFIL PAR DÉFAUT
# ===================================================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://dpg-d8naeg3tqb8s73cv0vbg-a/abdiltaxi?user=abdil_user&password=yKYugkBFwU2Z3sIa38somtDYVYn48Yte&sslmode=require}
    username: ${DATABASE_USERNAME:abdil_user}
    password: ${DATABASE_PASSWORD:yKYugkBFwU2Z3sIa38somtDYVYn48Yte}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
    show-sql: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false
    servlet:
      content-type: text/html

  web:
    resources:
      static-locations:
        - classpath:/static/
        - classpath:/public/
        - classpath:/resources/
        - classpath:/META-INF/resources/
      add-mappings: true
    cache:
      period: 3600

  mvc:
    throw-exception-if-no-handler-found: false
    static-path-pattern: /**

server:
  port: ${PORT:8082}
  error:
    whitelabel:
      enabled: false

logging:
  level:
    com.abdil.support: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.thymeleaf: DEBUG

storage:
  voice: ${STORAGE_VOICE_PATH:/tmp/voice}
  attachments: ${STORAGE_ATTACHMENTS_PATH:/tmp/attachments}

notification:
  email:
    enabled: ${NOTIFICATION_EMAIL_ENABLED:true}
    from: ${NOTIFICATION_EMAIL_FROM:support@taxi-app.com}
  push:
    enabled: ${NOTIFICATION_PUSH_ENABLED:true}

support:
  max-tickets-per-agent: ${SUPPORT_MAX_TICKETS:5}
  auto-assign: ${SUPPORT_AUTO_ASSIGN:true}
  auto-close-days: ${SUPPORT_AUTO_CLOSE_DAYS:7}

api:
  main:
    url: ${MAIN_API_URL:https://abdil-taxi-backend.onrender.com/api}

---
# ===================================================================
# CONFIGURATION POUR LE DÉVELOPPEMENT LOCAL (VOTRE PC)
# ===================================================================
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:abdiltaxilocal;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect